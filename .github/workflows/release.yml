name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix, for example 1.1.0"
        required: true
        type: string
      prerelease:
        default: false
        description: "Mark the GitHub Release as a prerelease"
        required: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Check, archive docs, build, zip, and create release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate release input
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Release workflow must run from main."
            exit 1
          fi

          if ! printf '%s' "${RELEASE_VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "version must be a SemVer value without the v prefix."
            exit 1
          fi

          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "${PACKAGE_VERSION}" != "${RELEASE_VERSION}" ]; then
            echo "package.json version ${PACKAGE_VERSION} does not match input ${RELEASE_VERSION}."
            exit 1
          fi
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            docs/pnpm-lock.yaml
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install docs dependencies
        run: pnpm --dir docs install --frozen-lockfile

      - name: Archive docs version
        run: pnpm run docs:archive -- "${RELEASE_VERSION}"
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Run checks
        run: pnpm run check

      - name: Run tests
        run: pnpm test

      - name: Build Chrome extension
        run: pnpm run build

      - name: Build Firefox extension
        run: pnpm run build:firefox

      - name: Zip Chrome extension
        run: pnpm run zip

      - name: Zip Firefox extension
        run: pnpm run zip:firefox

      - name: Zip AMO source package
        run: pnpm run zip:amo-sources -- "${RELEASE_VERSION}"
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          RELEASE_ASSETS=(
            "dist/${PACKAGE_NAME}-${RELEASE_VERSION}-chrome.zip"
            "dist/${PACKAGE_NAME}-${RELEASE_VERSION}-firefox.zip"
            "dist/${PACKAGE_NAME}-${RELEASE_VERSION}-amo-sources.zip"
          )

          for asset in "${RELEASE_ASSETS[@]}"; do
            if [ ! -f "${asset}" ]; then
              echo "Missing release asset: ${asset}"
              exit 1
            fi

            cp "${asset}" release-assets/
          done

          ls -la release-assets
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Commit docs archive
        run: |
          if [ -z "$(git status --porcelain -- docs/src/data docs/src/content/docs docs/src/content/versions)" ]; then
            echo "Docs archive is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/src/data docs/src/content/docs docs/src/content/versions
          git commit -m "📚 docs v${RELEASE_VERSION} archiveを生成" -m "Release workflowでversioned docs snapshotを生成する"
          git push origin "HEAD:main"
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Resolve release target
        id: release-target
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Ensure release tag
        run: |
          TAG_NAME="v${RELEASE_VERSION}"

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Release tag ${TAG_NAME} already exists."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG_NAME}" HEAD -m "${TAG_NAME}"
          git push origin "refs/tags/${TAG_NAME}"
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Create or update draft release
        run: |
          TAG_NAME="v${RELEASE_VERSION}"
          RELEASE_FLAGS=(--draft --target "${RELEASE_TARGET_SHA}" --title "${TAG_NAME}")

          if [ "${IS_PRERELEASE}" = "true" ]; then
            RELEASE_FLAGS+=(--prerelease)
          fi

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" release-assets/*.zip --clobber
          else
            gh release create "${TAG_NAME}" release-assets/*.zip "${RELEASE_FLAGS[@]}" --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IS_PRERELEASE: ${{ inputs.prerelease }}
          RELEASE_TARGET_SHA: ${{ steps.release-target.outputs.sha }}
          RELEASE_VERSION: ${{ inputs.version }}
