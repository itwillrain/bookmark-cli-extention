name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix, for example 1.1.0"
        required: true
        type: string
      prerelease:
        default: false
        description: "Mark the GitHub Release as a prerelease"
        required: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Check, build, zip, and create release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate release input
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Release workflow must run from main."
            exit 1
          fi

          if ! printf '%s' "${RELEASE_VERSION}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "version must be a SemVer value without the v prefix."
            exit 1
          fi

          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "${PACKAGE_VERSION}" != "${RELEASE_VERSION}" ]; then
            echo "package.json version ${PACKAGE_VERSION} does not match input ${RELEASE_VERSION}."
            exit 1
          fi
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks
        run: pnpm run check

      - name: Run tests
        run: pnpm test

      - name: Build extension
        run: pnpm run build

      - name: Zip extension
        run: pnpm run zip

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find dist -maxdepth 1 -type f -name "*-${RELEASE_VERSION}-*.zip" -exec cp {} release-assets/ \;

          if [ -z "$(find release-assets -maxdepth 1 -type f -name "*.zip" -print -quit)" ]; then
            echo "No zip assets were generated."
            exit 1
          fi

          ls -la release-assets
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Create or update draft release
        run: |
          TAG_NAME="v${RELEASE_VERSION}"
          RELEASE_FLAGS=(--draft --target "${GITHUB_SHA}" --title "${TAG_NAME}")

          if [ "${IS_PRERELEASE}" = "true" ]; then
            RELEASE_FLAGS+=(--prerelease)
          fi

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" release-assets/*.zip --clobber
          else
            gh release create "${TAG_NAME}" release-assets/*.zip "${RELEASE_FLAGS[@]}" --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IS_PRERELEASE: ${{ inputs.prerelease }}
          RELEASE_VERSION: ${{ inputs.version }}
