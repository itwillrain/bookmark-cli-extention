version: 2
updates:
  - package-ecosystem: npm
    directory: /
    labels:
      - dependencies
      - automerge
    schedule:
      interval: weekly
    groups:
      npm-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /docs
    labels:
      - dependencies
      - automerge
    schedule:
      interval: weekly
    groups:
      docs-npm-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    labels:
      - dependencies
      - automerge
    schedule:
      interval: weekly
    groups:
      github-actions-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 5
