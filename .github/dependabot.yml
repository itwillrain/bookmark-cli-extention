version: 2
updates:
  - package-ecosystem: npm
    directory: /
    labels:
      - dependencies
      - automerge
    schedule:
      interval: weekly
    groups:
      npm-minor-and-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /docs
    labels:
      - dependencies
      - automerge
    schedule:
      interval: weekly
    groups:
      docs-npm-minor-and-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      docs-npm-security:
        applies-to: security-updates
        patterns:
          - "*"
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    labels:
      - dependencies
      - automerge
    schedule:
      interval: weekly
    groups:
      github-actions-minor-and-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"
    open-pull-requests-limit: 5
