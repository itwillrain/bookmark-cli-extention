name: Documentation issue
description: Report missing, confusing, or outdated docs.
title: "[Docs]: "
labels: ["documentation", "needs-triage"]
body:
  - type: dropdown
    id: doc-area
    attributes:
      label: Documentation area
      options:
        - Product specs
        - Command reference
        - CLI behavior
        - Architecture
        - Storage, permissions, or privacy
        - Testing policy
        - Release operation
        - API reference
        - Other
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Page or file
      placeholder: "docs/src/content/docs/specs/command-reference.md"
  - type: textarea
    id: problem
    attributes:
      label: What is unclear or missing?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Suggested wording or expected information
  - type: checkboxes
    id: ssot
    attributes:
      label: SSOT check
      options:
        - label: This may affect code behavior or tests, not only wording.
