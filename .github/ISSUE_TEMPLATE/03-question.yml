name: Question or documentation
description: Ask a usage, setup, contribution, or documentation question.
title: "[Question]: "
labels: ["question", "needs-triage"]
body:
  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Usage
        - Command behavior
        - Setup
        - Browser compatibility
        - Contribution
        - Documentation
        - Release or store
        - Other
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What do you want to know or clarify?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Optional. Browser, version, command, docs page, or related issue.
