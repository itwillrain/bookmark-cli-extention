name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'
no-changes-template: "- No user-facing changes."
categories:
  - title: "Features"
    labels:
      - feature
      - enhancement
  - title: "Bug Fixes"
    labels:
      - bug
      - fix
  - title: "Documentation"
    labels:
      - documentation
      - docs
  - title: "Maintenance"
    labels:
      - chore
      - refactor
      - dependencies
exclude-labels:
  - skip-changelog
version-resolver:
  major:
    labels:
      - major
  minor:
    labels:
      - minor
      - enhancement
      - feature
  patch:
    labels:
      - patch
      - bug
      - fix
      - documentation
      - docs
      - chore
      - refactor
      - dependencies
  default: patch
template: |
  ## Changes

  $CHANGES

  ## Contributors

  $CONTRIBUTORS
